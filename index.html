<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Thu mua iPhone</title>

<style>
body{font-family:Arial;margin:0;background:#f5f5f5}
header{background:#000;color:#fff;text-align:center;padding:15px}
.container{max-width:600px;margin:auto;background:#fff;padding:20px;border-radius:10px;margin-top:20px}
select,input,button{width:100%;padding:12px;margin-top:10px;font-size:16px}
button{background:red;color:#fff;font-weight:bold;border:none}
.result{background:#eaffea;padding:15px;margin-top:15px}
.price{font-size:22px;color:green;font-weight:bold}
#preview img{width:70px;height:70px;margin:5px;border-radius:6px}
#adminBtn{
 position:fixed;bottom:20px;right:20px;
 width:55px;height:55px;border-radius:50%;
 background:black;color:white;font-size:20px;
 border:none;z-index:9999
}
</style>
</head>

<body>

<header><h2>📱 THU MUA IPHONE</h2></header>

<div class="container">

<h3>Ảnh máy (tối đa 10)</h3>
<input type="file" id="images" multiple accept="image/*">
<div id="preview"></div>

<h3>Dòng máy</h3>
<select id="model"></select>

<h3>Dung lượng</h3>
<select id="storage">
<option value="">-- chọn --</option>
<option value="64">64GB</option>
<option value="128">128GB</option>
<option value="256">256GB</option>
<option value="512">512GB</option>
<option value="1tb">1TB</option>
</select>

<h3>Pin</h3>
<select id="battery">
<option value="">-- chọn --</option>
<option value="95">≥90%</option>
<option value="88">85–89%</option>
<option value="82">80–84%</option>
<option value="75"><80%</option>
</select>

<h3>Ngoại hình</h3>
<select id="damage">
<option value="">-- chọn --</option>
<option value="đẹp">Đẹp</option>
<option value="nhẹ">Trầy nhẹ</option>
<option value="viền">Trầy viền</option>
<option value="nặng">Móp / xấu</option>
</select>

<h3>Màn hình</h3>
<select id="screen">
<option value="">-- chọn --</option>
<option value="zin">Zin</option>
<option value="oled">Đã thay OLED</option>
<option value="bể">Bể / sọc</option>
</select>

<h3>Zalo</h3>
<input type="tel" id="zalo" placeholder="Nhập số Zalo" inputmode="numeric">

<button id="btnSubmit">XEM GIÁ</button>

<div id="result"></div>

</div>

<button id="adminBtn">⚙️</button>

<script>

// ===== DOM =====
const result = document.getElementById("result");
const zaloInput = document.getElementById("zalo");

// ===== MODEL =====
const MODELS=[
"iphone x","iphone xs","iphone xs max","iphone xr",
"iphone 11","iphone 11 pro","iphone 11 pro max",
"iphone 12","iphone 12 mini","iphone 12 pro","iphone 12 pro max",
"iphone 13","iphone 13 mini","iphone 13 pro","iphone 13 pro max",
"iphone 14","iphone 14 plus","iphone 14 pro","iphone 14 pro max",
"iphone 15","iphone 15 plus","iphone 15 pro","iphone 15 pro max",
"iphone 16","iphone 16 plus","iphone 16 pro","iphone 16 pro max",
"iphone 17","iphone 17 pro","iphone 17 pro max"
];

const modelSelect=document.getElementById("model");
MODELS.forEach(m=>{
 let opt=document.createElement("option");
 opt.value=m;
 opt.textContent=m.toUpperCase();
 modelSelect.appendChild(opt);
});

// ===== PREVIEW ẢNH =====
let selectedImages=[];
document.getElementById("images").addEventListener("change",function(){
 let files=[...this.files].slice(0,10);
 selectedImages=[];
 let preview=document.getElementById("preview");
 preview.innerHTML="";

 files.forEach(file=>{
  let reader=new FileReader();
  reader.onload=e=>{
    selectedImages.push(e.target.result);
    let img=document.createElement("img");
    img.src=e.target.result;
    preview.appendChild(img);
  };
  reader.readAsDataURL(file);
 });
});

// ===== TÍNH GIÁ =====
function calc(){
 let battery=parseInt(document.getElementById("battery").value || "0");
 let damage=document.getElementById("damage").value;
 let screen=document.getElementById("screen").value;

 let base=6000000;
 let final=base;

 if(damage==="nhẹ") final-=300000;
 if(damage==="viền") final-=600000;
 if(damage==="nặng") final-=1000000;

 if(battery<80) final-=700000;
 else if(battery<85) final-=300000;

 if(screen==="bể") final-=2000000;
 if(screen==="oled") final-=1200000;

 return final<0?0:final;
}

// ===== SUBMIT =====
document.getElementById("btnSubmit").addEventListener("click",function(){

 let model=modelSelect.value;
 let storage=document.getElementById("storage").value;
 let battery=document.getElementById("battery").value;
 let damage=document.getElementById("damage").value;
 let screen=document.getElementById("screen").value;

 // 👉 chỉ lọc số TẠI ĐÂY (không phá input)
 let zalo=zaloInput.value.trim().replace(/\D/g,"");

 let missing=[];
 if(!model) missing.push("dòng máy");
 if(!storage) missing.push("dung lượng");
 if(!battery) missing.push("pin");
 if(!damage) missing.push("ngoại hình");
 if(!screen) missing.push("màn");

 if(missing.length){
  result.innerHTML=`❌ Thiếu: ${missing.join(", ")}`;
  return;
 }

 if(!zalo){
  result.innerHTML="⚠️ Nhập Zalo";
  return;
 }

 if(!/^0[0-9]{9}$/.test(zalo)){
  result.innerHTML="⚠️ Số Zalo không hợp lệ";
  return;
 }

 // hiển thị lại số đã lọc
 zaloInput.value = zalo;

 let price=calc();

 result.innerHTML=`
 <div class="result">
   <div class="price">💰 ${price.toLocaleString()} VNĐ</div>
   <p>👉 Giá tham khảo</p>
 </div>`;

 // ===== LƯU =====
 let customers=JSON.parse(localStorage.getItem("customers")||"[]");
 customers.push({
  stt:customers.length+1,
  time:new Date().toLocaleString(),
  model,storage,battery,damage,screen,zalo,
  images:selectedImages.length
 });
 localStorage.setItem("customers",JSON.stringify(customers));

});

// ===== ADMIN =====
document.getElementById("adminBtn").addEventListener("click",function(){

 let user=prompt("User:");
 if(user===null) return;

 let pass=prompt("Pass:");
 if(pass===null) return;

 if(user==="admin" && pass==="123456"){
   downloadCSV();
 }else{
   alert("Sai tài khoản");
 }

});

// ===== EXPORT =====
function downloadCSV(){
 let data=JSON.parse(localStorage.getItem("customers")||"[]");
 if(!data.length){
  alert("Chưa có dữ liệu");
  return;
 }

 let csv="STT,Time,Model,Storage,Pin,Damage,Screen,Zalo,Images\n";

 data.forEach(d=>{
  csv+=`${d.stt},${d.time},${d.model},${d.storage},${d.battery},${d.damage},${d.screen},${d.zalo},${d.images}\n`;
 });

 let blob=new Blob([csv],{type:"text/csv"});
 let url=URL.createObjectURL(blob);
 let a=document.createElement("a");
 a.href=url;
 a.download="khach.csv";
 a.click();
}

</script>

</body>
</html>
