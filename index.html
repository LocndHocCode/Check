<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Thu mua iPhone</title>

<style>
body{font-family:Arial;background:#f2f4f7;margin:0}
header{background:#000;color:#fff;text-align:center;padding:15px;font-size:18px}
.container{max-width:600px;margin:auto;background:#fff;padding:20px;border-radius:12px;margin-top:20px;box-shadow:0 5px 15px rgba(0,0,0,0.1)}
select,input{width:100%;padding:12px;margin-top:10px;border-radius:8px;border:1px solid #ddd}
button{width:100%;padding:14px;margin-top:15px;background:#e60023;color:#fff;border:none;border-radius:8px;font-weight:bold}
.result{margin-top:15px;padding:15px;background:#eaffea;border-radius:10px;text-align:center}
.price{font-size:24px;color:#00a000;font-weight:bold}
.note{font-size:13px;color:#555}
#adminBtn{position:fixed;bottom:20px;right:20px;width:55px;height:55px;border-radius:50%;background:#000;color:#fff;border:none}

/* ảnh */
.upload-box{border:2px dashed #ccc;padding:15px;text-align:center;border-radius:10px;cursor:pointer}
.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-top:10px}
.img-item{position:relative}
.img-item img{width:100%;height:90px;object-fit:cover;border-radius:8px}
.remove{position:absolute;top:3px;right:3px;background:red;color:#fff;border:none;border-radius:50%;width:20px;height:20px;font-size:12px}
</style>
</head>

<body>

<header>📱 THU MUA IPHONE</header>

<div class="container">

<h3>Ảnh máy (tối đa 10)</h3>
<div class="upload-box" onclick="document.getElementById('images').click()">📷 Chọn ảnh</div>
<input type="file" id="images" multiple accept="image/*" hidden>
<div id="preview" class="grid"></div>

<select id="model"></select>

<select id="storage">
<option value="">Dung lượng</option>
<option value="128">128GB</option>
<option value="256">256GB</option>
<option value="512">512GB</option>
<option value="1tb">1TB</option>
</select>

<select id="battery">
<option value="">Pin</option>
<option value="95">≥90%</option>
<option value="88">85-89%</option>
<option value="82">80-84%</option>
<option value="75"><80%</option>
</select>

<select id="damage">
<option value="">Ngoại hình</option>
<option value="đẹp">Đẹp</option>
<option value="nhẹ">Trầy nhẹ</option>
<option value="viền">Trầy viền</option>
<option value="nặng">Móp</option>
</select>

<select id="screen">
<option value="">Màn hình</option>
<option value="zin">Zin</option>
<option value="oled">OLED</option>
<option value="bể">Bể</option>
</select>

<select id="icloud">
<option value="">iCloud</option>
<option value="ok">Chính chủ</option>
<option value="lock">Dính iCloud</option>
</select>

<input type="tel" id="zalo" placeholder="Nhập số Zalo">

<button onclick="calc()">XEM GIÁ</button>

<div id="result"></div>

</div>

<button id="adminBtn" onclick="admin()">⚙️</button>

<script>

// ===== MODEL =====
const MODELS=[
"iphone x","iphone xr","iphone xs max",
"iphone 11","iphone 11 pro","iphone 11 pro max",
"iphone 12","iphone 12 pro","iphone 12 pro max",
"iphone 13","iphone 13 pro","iphone 13 pro max",
"iphone 14","iphone 14 pro","iphone 14 pro max",
"iphone 15","iphone 15 pro","iphone 15 pro max",
"iphone 16","iphone 16 pro","iphone 16 pro max",
"iphone 17","iphone 17 pro","iphone 17 pro max"
];

let modelSelect=document.getElementById("model");
MODELS.forEach(m=>{
 let o=document.createElement("option");
 o.value=m;
 o.textContent=m.toUpperCase();
 modelSelect.appendChild(o);
});

// ===== GIÁ CHỢ =====
const BASE={
"iphone x":2500000,"iphone xr":3500000,"iphone xs max":4500000,
"iphone 11":5000000,"iphone 11 pro":6000000,"iphone 11 pro max":7000000,
"iphone 12":7000000,"iphone 12 pro":9000000,"iphone 12 pro max":12000000,
"iphone 13":9000000,"iphone 13 pro":13000000,"iphone 13 pro max":15000000,
"iphone 14":11000000,"iphone 14 pro":16000000,"iphone 14 pro max":18000000,
"iphone 15":14000000,"iphone 15 pro":17000000,"iphone 15 pro max":20000000,
"iphone 16":15000000,"iphone 16 pro":18000000,"iphone 16 pro max":23000000,
"iphone 17":17000000,"iphone 17 pro":21000000,"iphone 17 pro max":26000000
};

// ===== GIÁ MÀN =====
const SCREEN_PRICE={
"iphone x":1800000,"iphone xr":2000000,"iphone xs max":2500000,
"iphone 11":2200000,"iphone 11 pro":3000000,"iphone 11 pro max":3500000,
"iphone 12":3000000,"iphone 12 pro":4000000,"iphone 12 pro max":5000000,
"iphone 13":3500000,"iphone 13 pro":5000000,"iphone 13 pro max":6000000,
"iphone 14":4000000,"iphone 14 pro":6000000,"iphone 14 pro max":7000000,
"iphone 15":5000000,"iphone 15 pro":7000000,"iphone 15 pro max":9000000,
"iphone 16":6000000,"iphone 16 pro":9000000,"iphone 16 pro max":12000000,
"iphone 17":8000000,"iphone 17 pro":12000000,"iphone 17 pro max":15000000
};

// ===== ẢNH =====
let selectedImages=[];

document.getElementById("images").addEventListener("change",function(){
let files=[...this.files];
files.forEach(file=>{
 if(selectedImages.length>=10) return alert("Tối đa 10 ảnh");

 let reader=new FileReader();
 reader.onload=e=>{
   selectedImages.push(e.target.result);
   renderImg();
 };
 reader.readAsDataURL(file);
});
this.value="";
});

function renderImg(){
let preview=document.getElementById("preview");
preview.innerHTML="";
selectedImages.forEach((img,i)=>{
 preview.innerHTML+=`
 <div class="img-item">
 <img src="${img}">
 <button class="remove" onclick="removeImg(${i})">×</button>
 </div>`;
});
}

function removeImg(i){
selectedImages.splice(i,1);
renderImg();
}

// ===== CALC =====
function calc(){

let model=modelSelect.value;
let storage=document.getElementById("storage").value;
let battery=parseInt(document.getElementById("battery").value||0);
let damage=document.getElementById("damage").value;
let screen=document.getElementById("screen").value;
let icloud=document.getElementById("icloud").value;
let zalo=document.getElementById("zalo").value.trim().replace(/\D/g,"");

let result=document.getElementById("result");

if(!model||!storage||!battery||!damage||!screen||!icloud){
 return result.innerHTML="❌ Nhập đầy đủ thông tin";
}

if(!/^0[0-9]{9}$/.test(zalo)){
 return result.innerHTML="⚠️ Nhập Zalo hợp lệ";
}

// ===== ICLOUD =====
if(icloud==="lock"){
 let price=SCREEN_PRICE[model]*0.75;
 if(screen==="oled") price*=0.6;
 if(screen==="bể") price=2000000;

 if(damage==="nhẹ") price-=300000;
 if(damage==="viền") price-=600000;
 if(damage==="nặng") price-=1000000;

 show(price,"Giá thu xác (iCloud)");
 save(model,storage,battery,damage,screen,zalo,"icloud");
 return;
}

// ===== THƯỜNG =====
let price=BASE[model];

if(storage==="256") price+=1000000;
if(storage==="512") price+=2000000;
if(storage==="1tb") price+=4000000;

price-=700000;

if(damage==="nhẹ") price-=400000;
if(damage==="viền") price-=800000;
if(damage==="nặng") price-=1500000;

if(battery<85) price-=500000;
if(battery<80) price-=800000;

if(screen==="oled") price-=1200000;
if(screen==="bể"){
 if(price>20000000) price-=4000000;
 else if(price>10000000) price-=2500000;
 else price-=1500000;
}

show(price,"Giá thu tham khảo");
save(model,storage,battery,damage,screen,zalo,"normal");

}

function show(p,note){
document.getElementById("result").innerHTML=`
<div class="result">
<div class="price">${Math.round(p).toLocaleString()} VNĐ</div>
<div class="note">${note}</div>
</div>`;
}

// ===== SAVE =====
function save(model,storage,battery,damage,screen,zalo,type){
let data=JSON.parse(localStorage.getItem("data")||"[]");
data.push({model,storage,battery,damage,screen,zalo,type,images:selectedImages});
localStorage.setItem("data",JSON.stringify(data));
}

// ===== ADMIN =====
function admin(){
let u=prompt("user");
let p=prompt("pass");

if(u==="admin"&&p==="123456"){
 let data=JSON.parse(localStorage.getItem("data")||"[]");

 let csv="model,storage,pin,damage,screen,zalo,type\n";
 data.forEach(d=>{
  csv+=`${d.model},${d.storage},${d.battery},${d.damage},${d.screen},${d.zalo},${d.type}\n`;
 });

 let blob=new Blob([csv]);
 let a=document.createElement("a");
 a.href=URL.createObjectURL(blob);
 a.download="khach.csv";
 a.click();

 data.forEach((d,i)=>{
  d.images.forEach((img,j)=>{
    let link=document.createElement("a");
    link.href=img;
    link.download=`khach_${i}_${j}.jpg`;
    link.click();
  });
 });

}else{
 alert("Sai tài khoản");
}
}

</script>

</body>
</html>
