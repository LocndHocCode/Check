<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Thu mua điện thoại PRO</title>

<style>
body{margin:0;font-family:-apple-system;background:#f2f2f7}

header{
position:sticky;top:0;background:#fff;
padding:14px;text-align:center;font-weight:600;
border-bottom:1px solid #eee
}

.progress{height:4px;background:#ddd}
.progress-bar{
height:100%;width:0;
background:linear-gradient(90deg,#007aff,#34c759)
}

.container{max-width:500px;margin:auto;padding:15px}

.card{
background:#fff;border-radius:18px;
padding:18px;box-shadow:0 10px 25px rgba(0,0,0,.08)
}

.grid{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:10px;margin-top:10px
}

.item{
padding:12px;
background:#f2f2f7;
border-radius:12px;
text-align:center
}

.item.active{background:#007aff;color:#fff}

.tab{
flex:1;padding:12px;
background:#eee;border-radius:12px;
text-align:center;font-weight:600
}

.tab.active{background:#007aff;color:#fff}

.btn,.next{
padding:14px;border-radius:14px;margin-top:10px;
text-align:center;font-weight:600
}

.btn{background:#eee}
.next{background:#007aff;color:#fff}

.price{
font-size:26px;text-align:center;
color:#34c759;font-weight:700;margin-top:15px
}

.summary{
font-size:13px;background:#fff;
padding:8px;border-bottom:1px solid #eee
}

</style>
</head>

<body>

<header>📱 Thu mua điện thoại</header>

<div class="summary" id="summary">Chưa chọn</div>

<div class="progress">
<div id="progressBar" class="progress-bar"></div>
</div>

<div class="container">
<div class="card">

<!-- TAB -->
<div style="display:flex;gap:10px">
<div class="tab active" onclick="switchTab('ios')">🍎 iPhone</div>
<div class="tab" onclick="switchTab('android')">🤖 Android</div>
</div>

<!-- MODEL -->
<div id="modelList" class="grid"></div>

<div class="next" onclick="next()">Tiếp</div>

<!-- STORAGE -->
<div class="step">
<div id="storageList" class="grid"></div>
<div class="btn" onclick="prev()">← Quay lại</div>
<div class="next" onclick="next()">Tiếp</div>
</div>

<!-- PIN -->
<div class="step">
<input type="range" id="battery" min="70" max="100" value="90">
<div>🔋 <span id="batteryValue">90</span>%</div>

<div class="grid">
<div class="item" onclick="pick(this,'pin','zin')">Pin zin</div>
<div class="item" onclick="pick(this,'pin','thay')">Pin thay</div>
</div>

<div class="btn" onclick="prev()">← Quay lại</div>
<div class="next" onclick="next()">Tiếp</div>
</div>

<!-- MÀN + BODY -->
<div class="step">

<div class="grid">
<div class="item" onclick="pick(this,'screen','zin')">Màn zin</div>
<div class="item" onclick="pick(this,'screen','ep')">Màn ép</div>
<div class="item" onclick="pick(this,'screen','lo')">Màn lô</div>
</div>

<div class="grid">
<div class="item" onclick="pick(this,'body','zin')">Chưa bung</div>
<div class="item" onclick="pick(this,'body','bung')">Đã bung</div>
</div>

<div class="btn" onclick="prev()">← Quay lại</div>
<div class="next" onclick="calc()">Xem giá</div>
</div>

</div>

<div id="result"></div>

</div>

<script>

// DATA MODEL
const DATA={
ios:[
"iPhone X","iPhone XR","iPhone XS","iPhone XS Max",
"iPhone 11","iPhone 11 Pro","iPhone 11 Pro Max",
"iPhone 12","iPhone 12 Pro","iPhone 12 Pro Max",
"iPhone 13","iPhone 13 Pro","iPhone 13 Pro Max",
"iPhone 14","iPhone 14 Pro","iPhone 14 Pro Max",
"iPhone 15","iPhone 15 Pro","iPhone 15 Pro Max",
"iPhone 16","iPhone 16 Pro","iPhone 16 Pro Max",
"iPhone 17","iPhone 17 Pro","iPhone 17 Pro Max"
],
android:[
"Samsung S21","Samsung S22","Samsung S23",
"Samsung S24","Xiaomi 12","Xiaomi 13",
"Oppo Find X5","Oppo Find X6"
]
};

// BASE GIÁ
const PRICE={
"iPhone X":4000000,"iPhone XR":4500000,"iPhone XS Max":6000000,
"iPhone 11":6000000,"iPhone 12":7500000,
"iPhone 13":9500000,"iPhone 14":11000000,
"iPhone 15":13000000,"iPhone 16":16000000,
"iPhone 17":18000000
};

let step=0;
let currentTab="ios";
let selectedModel="";
let selected={};

// STEP
const steps=document.querySelectorAll(".step");

function show(){
steps.forEach(s=>s.style.display="none");
if(step>0) steps[step-1].style.display="block";

document.getElementById("progressBar").style.width=(step/4*100)+"%";

updateSummary();
}

// TAB
function switchTab(tab){
currentTab=tab;
document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
event.target.classList.add("active");
renderModels();
}

// MODEL
function renderModels(){
const box=document.getElementById("modelList");
box.innerHTML="";
DATA[currentTab].forEach(m=>{
box.innerHTML+=`<div class="item" onclick="selectModel(this,'${m}')">${m}</div>`;
});
}

// SELECT MODEL
function selectModel(el,m){
selectedModel=m;
document.querySelectorAll("#modelList .item").forEach(i=>i.classList.remove("active"));
el.classList.add("active");
loadStorage();
}

// STORAGE
function loadStorage(){
const box=document.getElementById("storageList");
box.innerHTML="";
[64,128,256,512].forEach(x=>{
box.innerHTML+=`<div class="item" onclick="selectStorage(this,${x})">${x}GB</div>`;
});
}

function selectStorage(el,v){
selected.storage=v;
document.querySelectorAll("#storageList .item").forEach(i=>i.classList.remove("active"));
el.classList.add("active");
}

// PICK
function pick(el,k,v){
selected[k]=v;
el.parentElement.querySelectorAll(".item").forEach(i=>i.classList.remove("active"));
el.classList.add("active");
}

// NAV
function next(){step++;show()}
function prev(){step--;show()}

// SUMMARY
function updateSummary(){
document.getElementById("summary").innerText=
`${selectedModel||""} | ${selected.storage||""}GB | Pin ${battery.value}%`;
}

// PIN
battery.oninput=()=>batteryValue.innerText=battery.value;

// CALC
function calc(){

let base=PRICE[selectedModel]||8000000;
let price=base;

// dung lượng
if(selected.storage>=256) price+=1000000;
if(selected.storage>=512) price+=2000000;

// pin
if(battery.value<85) price-=500000;
if(selected.pin==="thay") price-=700000;

// màn
if(selected.screen==="ep") price-=800000;
if(selected.screen==="lo") price-=1500000;

// body
if(selected.body==="bung") price-=1500000;

// điểm máy
let score=10;
if(battery.value<85) score-=1;
if(selected.screen==="lo") score-=2;
if(selected.body==="bung") score-=2;

// hiển thị
let min=Math.round(price*0.9);
let max=Math.round(price*1.05);

document.getElementById("result").innerHTML=
`<div class="price">${min.toLocaleString()} - ${max.toLocaleString()}đ</div>
<div style="text-align:center;margin-top:5px">Điểm máy: ${score}/10</div>`;

// CRM
let list=JSON.parse(localStorage.getItem("data")||"[]");
list.unshift({model:selectedModel,price:min,time:new Date().toLocaleString()});
localStorage.setItem("data",JSON.stringify(list));
}

// INIT
renderModels();
show();

</script>

</body>
</html>
