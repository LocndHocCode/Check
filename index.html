<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Thu mua iPhone PRO</title>

<style>
body{font-family:Arial;background:#f5f6fa;margin:0}
header{background:#ffd500;padding:14px;text-align:center;font-weight:bold}
.container{max-width:520px;margin:auto;padding:15px}
.card{background:#fff;padding:15px;border-radius:12px;box-shadow:0 4px 12px rgba(0,0,0,.1)}

.step{display:none;animation:fade .3s}
.step.active{display:block}
@keyframes fade{from{opacity:0}to{opacity:1}}

input,select{width:100%;padding:12px;margin-top:10px;border-radius:8px;border:1px solid #ddd}
.next{margin-top:15px;padding:12px;background:#ffd500;border:none;border-radius:10px;width:100%;font-weight:bold}

.grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.btn{padding:12px;border:1px solid #ddd;border-radius:10px;text-align:center;cursor:pointer}
.btn.active{border:2px solid #ffd500;background:#fffbe6}

.result{margin-top:15px;background:#fff;padding:15px;border-radius:12px}
.price{font-size:24px;color:green;font-weight:bold;text-align:center}

.accordion{margin-top:10px;border:1px solid #eee;border-radius:10px}
.acc-title{display:flex;justify-content:space-between;padding:12px;cursor:pointer}
.arrow{transition:.3s}
.arrow.rotate{transform:rotate(90deg)}
.check{color:green}
.acc-content{max-height:0;overflow:hidden;transition:.3s;padding:0 12px}
.acc-content label{display:block;margin:8px 0}

.link{display:block;margin-top:10px;padding:12px;background:#0084ff;color:#fff;text-align:center;border-radius:10px;text-decoration:none}
</style>
</head>

<body>

<header>📱 THU MUA IPHONE</header>

<div class="container">
<div class="card">

<!-- STEP 1 -->
<div class="step active" id="step1">
<h3>Dòng máy</h3>
<select id="model"></select>
<button class="next" onclick="next(2)">Tiếp</button>
</div>

<!-- STEP 2 -->
<div class="step" id="step2">
<h3>Dung lượng</h3>
<select id="storage"></select>
<button class="next" onclick="setStorage()">Tiếp</button>
</div>

<!-- STEP 3 -->
<div class="step" id="step3">
<h3>Pin</h3>
<input type="range" id="battery" min="70" max="100" value="90">
<div>🔋 <span id="batteryValue">90</span>%</div>

<div class="grid">
<div class="btn" onclick="pick(this,'pinType','zin')">Pin zin</div>
<div class="btn" onclick="pick(this,'pinType','thay')">Pin thay</div>
</div>

<button class="next" onclick="setBattery()">Tiếp</button>
</div>

<!-- STEP 4 -->
<div class="step" id="step4">
<h3>Thông tin máy</h3>

<select id="market">
<option value="VNA">VN/A</option>
<option value="LL">LL/A</option>
<option value="ZP">ZP/A</option>
<option value="JA">J/A</option>
<option value="KH">KH/A</option>
<option value="CH">CH/A</option>
<option value="EU">EU</option>
</select>

<div class="grid">
<div class="btn" onclick="pick(this,'body','zin')">Chưa bung</div>
<div class="btn" onclick="pick(this,'body','bung')">Đã bung</div>
</div>

<button class="next" onclick="next(5)">Tiếp</button>
</div>

<!-- STEP 5 -->
<div class="step" id="step5">
<h3>🔎 Kiểm tra lỗi</h3>

<div class="accordion">
<div class="acc-title" onclick="toggleAcc(this)">
<span class="arrow">▶</span> Màn <span class="check"></span>
</div>
<div class="acc-content">
<label><input type="radio" name="screen" value="ok" onchange="mark(this)"> OK</label>
<label><input type="radio" name="screen" value="scratch" onchange="mark(this)"> Trầy nhẹ</label>
<label><input type="radio" name="screen" value="line" onchange="mark(this)"> Sọc</label>
<label><input type="radio" name="screen" value="broken" onchange="mark(this)"> Bể</label>
</div>
</div>

<div class="accordion">
<div class="acc-title" onclick="toggleAcc(this)">
<span class="arrow">▶</span> Camera <span class="check"></span>
</div>
<div class="acc-content">
<label><input type="radio" name="cam" value="ok" onchange="mark(this)"> OK</label>
<label><input type="radio" name="cam" value="dead" onchange="mark(this)"> Hư</label>
</div>
</div>

<div class="accordion">
<div class="acc-title" onclick="toggleAcc(this)">
<span class="arrow">▶</span> FaceID <span class="check"></span>
</div>
<div class="acc-content">
<label><input type="radio" name="face" value="ok" onchange="mark(this)"> OK</label>
<label><input type="radio" name="face" value="fail" onchange="mark(this)"> Lỗi</label>
</div>
</div>

<div class="accordion">
<div class="acc-title" onclick="toggleAcc(this)">
<span class="arrow">▶</span> Main <span class="check"></span>
</div>
<div class="acc-content">
<label><input type="radio" name="main" value="ok" onchange="mark(this)"> OK</label>
<label><input type="radio" name="main" value="fix" onchange="mark(this)"> Đã sửa</label>
</div>
</div>

<button class="next" onclick="next(6)">Tiếp</button>
</div>

<!-- STEP 6 -->
<div class="step" id="step6">
<input id="name" placeholder="Tên khách">
<input id="phone" placeholder="SĐT">
<input id="expect" placeholder="Giá mong muốn (vd 15tr)">
<button class="next" onclick="calc()">Xem giá</button>
</div>

</div>

<div id="result"></div>

<a id="zalo" class="link" target="_blank">💬 Gửi Zalo</a>
<button class="next" onclick="openCRM()">📊 CRM</button>

<div id="crmBox" class="result" style="display:none"></div>

</div>

<script>

// ===== DATA FULL =====
const DATA = {
"iphone x":{price:2500000,storage:[64,256]},
"iphone xr":{price:3500000,storage:[64,128,256]},
"iphone xs":{price:4000000,storage:[64,256,512]},
"iphone xs max":{price:4500000,storage:[64,256,512]},

"iphone 11":{price:5000000,storage:[64,128,256]},
"iphone 11 pro":{price:6500000,storage:[64,256,512]},
"iphone 11 pro max":{price:7500000,storage:[64,256,512]},

"iphone 12 mini":{price:7500000,storage:[64,128,256]},
"iphone 12":{price:8000000,storage:[64,128,256]},
"iphone 12 pro":{price:10000000,storage:[128,256,512]},
"iphone 12 pro max":{price:12000000,storage:[128,256,512]},

"iphone 13 mini":{price:9500000,storage:[128,256,512]},
"iphone 13":{price:10000000,storage:[128,256,512]},
"iphone 13 pro":{price:13000000,storage:[128,256,512,1024]},
"iphone 13 pro max":{price:15000000,storage:[128,256,512,1024]},

"iphone 14":{price:12000000,storage:[128,256,512]},
"iphone 14 plus":{price:13000000,storage:[128,256,512]},
"iphone 14 pro":{price:14000000,storage:[128,256,512,1024]},
"iphone 14 pro max":{price:15000000,storage:[128,256,512,1024]},

"iphone 15":{price:14000000,storage:[128,256,512]},
"iphone 15 plus":{price:15000000,storage:[128,256,512]},
"iphone 15 pro":{price:16000000,storage:[128,256,512,1024]},
"iphone 15 pro max":{price:17000000,storage:[256,512,1024]},

"iphone 16":{price:16000000,storage:[128,256,512]},
"iphone 16 plus":{price:17000000,storage:[128,256,512]},
"iphone 16 pro":{price:18000000,storage:[128,256,512,1024]},
"iphone 16 pro max":{price:19000000,storage:[256,512,1024]},

"iphone 17":{price:18000000,storage:[128,256,512]},
"iphone 17 plus":{price:19000000,storage:[128,256,512]},
"iphone 17 pro":{price:20000000,storage:[128,256,512,1024]},
"iphone 17 pro max":{price:21000000,storage:[256,512,1024]}
};

// ===== INIT =====
let selected={};
let m=document.getElementById("model");

Object.keys(DATA).sort().forEach(x=>{
let o=document.createElement("option");
o.value=x;
o.textContent=x.toUpperCase();
m.appendChild(o);
});

function loadStorage(){
let s=document.getElementById("storage");
s.innerHTML="";
DATA[m.value].storage.forEach(x=>{
let o=document.createElement("option");
o.value=x;
o.textContent=x+"GB";
s.appendChild(o);
});
}
m.onchange=loadStorage;
loadStorage();

// ===== UI =====
function next(n){
document.querySelectorAll(".step").forEach(s=>s.classList.remove("active"));
document.getElementById("step"+n).classList.add("active");
}

function pick(el,k,v){
el.parentElement.querySelectorAll(".btn").forEach(b=>b.classList.remove("active"));
el.classList.add("active");
selected[k]=v;
}

function setStorage(){selected.storage=storage.value;next(3);}
function setBattery(){selected.battery=parseInt(battery.value);next(4);}
battery.oninput=()=>batteryValue.innerText=battery.value;

function toggleAcc(el){
let c=el.nextElementSibling;
let a=el.querySelector(".arrow");
c.style.maxHeight?c.style.maxHeight=null:c.style.maxHeight=c.scrollHeight+"px";
a.classList.toggle("rotate");
}

function mark(i){
let acc=i.closest(".accordion");
acc.querySelector(".check").innerText="✔";
}

// ===== PARSE GIÁ =====
function parseMoney(str){
str=str.toLowerCase();
if(str.includes("tr")) return parseFloat(str)*1000000;
return parseInt(str)*1000;
}

// ===== CALC =====
function calc(){

let base=DATA[m.value].price;
let price=base*0.9;
let score=10;

if(selected.battery<85){price-=500000;score-=1}
if(selected.pinType==="thay"){price-=600000;score-=1}
if(selected.body==="bung"){price-=1200000;score-=1.5}

let screen=document.querySelector("input[name='screen']:checked")?.value;
if(screen==="line"){price-=800000;score-=1}
if(screen==="broken"){price-=1500000;score-=2}

let cam=document.querySelector("input[name='cam']:checked")?.value;
if(cam==="dead"){price-=800000;score-=1}

let face=document.querySelector("input[name='face']:checked")?.value;
if(face==="fail"){price-=700000;score-=1}

let main=document.querySelector("input[name='main']:checked")?.value;
if(main==="fix"){price-=2000000;score-=2}

let mk=market.value;
if(mk==="VNA") price+=300000;
if(mk==="CH") price-=300000;

let min=Math.round(price*0.9);
let max=Math.round(price*1.05);
let deal=Math.round(min*0.97);

let crm=JSON.parse(localStorage.getItem("crm")||"[]");
crm.unshift({name:name.value,phone:phone.value,model:m.value,price:deal,time:new Date().toLocaleString()});
localStorage.setItem("crm",JSON.stringify(crm.slice(0,100)));

result.innerHTML=`
<div class="result">
⭐ ${score.toFixed(1)}/10
<div class="price">${min.toLocaleString()}đ - ${max.toLocaleString()}đ</div>
👉 Giá chốt: <b>${deal.toLocaleString()}đ</b>
</div>
`;

zalo.href="https://zalo.me/0827703579?text="+encodeURIComponent(`${m.value} ${deal}`);
}

// ===== CRM =====
function openCRM(){
let data=JSON.parse(localStorage.getItem("crm")||"[]");
let html="<h3>CRM khách</h3>";
data.forEach(x=>{
html+=`<div>${x.name} - ${x.phone} - ${x.price.toLocaleString()}đ</div>`;
});
crmBox.innerHTML=html;
crmBox.style.display="block";
}

</script>

</body>
</html>
