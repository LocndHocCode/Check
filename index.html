<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Thu mua iPhone</title>

<style>
body{font-family:Arial;background:#f2f2f2;margin:0}
header{background:#000;color:#fff;text-align:center;padding:15px;font-size:20px}
.container{max-width:520px;margin:auto;background:#fff;padding:20px;border-radius:12px;margin-top:15px}
select,input,button{width:100%;padding:12px;margin-top:10px;border-radius:8px;border:1px solid #ccc}
button{background:#e60023;color:#fff;font-weight:bold;border:none}
.result{margin-top:15px;padding:15px;background:#e6ffe6;border-radius:10px;text-align:center}
.price{font-size:26px;color:green;font-weight:bold}
.upload{border:2px dashed #ccc;padding:15px;text-align:center;border-radius:10px;color:#888}
#adminBtn{position:fixed;bottom:20px;right:20px;width:50px;height:50px;border-radius:50%;background:#000;color:#fff;border:none}
</style>
</head>

<body>

<header>📱 THU MUA IPHONE</header>

<div class="container">

<div class="upload" onclick="upload()">
📷 Chọn ảnh (đang phát triển)
</div>

<select id="model"><option value="">Chọn máy</option></select>
<select id="storage"><option value="">Dung lượng</option></select>

<select id="battery">
<option value="">Pin</option>
<option value="95">≥90%</option>
<option value="88">85-89%</option>
<option value="82">80-84%</option>
<option value="75"><80%</option>
</select>

<select id="damage">
<option value="">Ngoại hình</option>
<option value="đẹp">Đẹp</option>
<option value="nhẹ">Trầy nhẹ</option>
<option value="viền">Trầy viền</option>
<option value="nặng">Móp</option>
</select>

<select id="screen">
<option value="">Màn hình</option>
<option value="zin">Zin</option>
<option value="oled">OLED</option>
<option value="bể">Bể</option>
</select>

<select id="open">
<option value="">Tình trạng máy</option>
<option value="zin">Chưa bung</option>
<option value="bung">Đã bung</option>
</select>

<select id="icloud">
<option value="">iCloud</option>
<option value="ok">Chính chủ</option>
<option value="lock">Dính iCloud</option>
</select>

<input type="tel" id="zalo" placeholder="Nhập số Zalo" 
inputmode="numeric" oninput="this.value=this.value.replace(/[^0-9]/g,'')">

<button onclick="calc()">XEM GIÁ</button>

<div id="result"></div>

</div>

<button id="adminBtn" onclick="admin()">⚙️</button>

<script>

// ===== MODEL =====
const MODELS=[
"iphone x","iphone xr","iphone xs","iphone xs max",
"iphone 11","iphone 11 pro","iphone 11 pro max",
"iphone 12","iphone 12 pro","iphone 12 pro max",
"iphone 13","iphone 13 pro","iphone 13 pro max",
"iphone 14","iphone 14 pro","iphone 14 pro max",
"iphone 15","iphone 15 pro","iphone 15 pro max",
"iphone 16","iphone 16 pro","iphone 16 pro max",
"iphone 17","iphone 17 pro","iphone 17 pro max"
];

// ===== STORAGE =====
const STORAGE_MAP={
"iphone x":[64,256],
"iphone xs":[64,256,512],
"iphone xs max":[64,256,512],
"iphone xr":[64,128,256],

"iphone 11":[64,128,256],
"iphone 11 pro":[64,256,512],
"iphone 11 pro max":[64,256,512],

"iphone 12":[64,128,256],
"iphone 12 pro":[128,256,512],
"iphone 12 pro max":[128,256,512],

"iphone 13":[128,256,512],
"iphone 13 pro":[128,256,512,"1tb"],
"iphone 13 pro max":[128,256,512,"1tb"],

"iphone 14":[128,256,512],
"iphone 14 pro":[128,256,512,"1tb"],
"iphone 14 pro max":[128,256,512,"1tb"],

"iphone 15":[128,256,512],
"iphone 15 pro":[128,256,512,"1tb"],
"iphone 15 pro max":[256,512,"1tb"],

"iphone 16":[128,256,512],
"iphone 16 pro":[128,256,512,"1tb"],
"iphone 16 pro max":[256,512,"1tb"],

"iphone 17":[128,256,512],
"iphone 17 pro":[128,256,512,"1tb"],
"iphone 17 pro max":[256,512,"1tb"]
};

// ===== GIÁ CHỢ =====
const MARKET={
"iphone x":2500000,"iphone xr":3500000,"iphone xs":4000000,"iphone xs max":4500000,
"iphone 11":5000000,"iphone 11 pro":6000000,"iphone 11 pro max":7000000,
"iphone 12":7000000,"iphone 12 pro":9000000,"iphone 12 pro max":12000000,
"iphone 13":9000000,"iphone 13 pro":13000000,"iphone 13 pro max":15000000,
"iphone 14":12000000,"iphone 14 pro":15000000,"iphone 14 pro max":17000000,
"iphone 15":14000000,"iphone 15 pro":17000000,"iphone 15 pro max":19000000,
"iphone 16":15000000,"iphone 16 pro":18000000,"iphone 16 pro max":22000000,
"iphone 17":17000000,"iphone 17 pro":21000000,"iphone 17 pro max":25000000
};

// LOAD MODEL
let modelSelect=document.getElementById("model");
let storageSelect=document.getElementById("storage");

MODELS.forEach(m=>{
 let o=document.createElement("option");
 o.value=m;
 o.textContent=m.toUpperCase();
 modelSelect.appendChild(o);
});

// AUTO STORAGE
modelSelect.addEventListener("change",function(){
 let list=STORAGE_MAP[this.value]||[];
 storageSelect.innerHTML="<option value=''>Dung lượng</option>";
 list.forEach(s=>{
  let o=document.createElement("option");
  o.value=s;
  o.textContent=(s==="1tb")?"1TB":s+"GB";
  storageSelect.appendChild(o);
 });
});

// RATE
function rate(m){
 if(m.includes("pro max")) return 0.72;
 if(m.includes("pro")) return 0.74;
 return 0.78;
}

// SAVE LOCAL
function save(data){
 let list=JSON.parse(localStorage.getItem("khach")||"[]");
 list.push({...data,time:new Date().toLocaleString()});
 localStorage.setItem("khach",JSON.stringify(list));
}

// CALC
function calc(){

let model=modelSelect.value;
let storage=document.getElementById("storage").value;
let battery=parseInt(document.getElementById("battery").value||0);
let damage=document.getElementById("damage").value;
let screen=document.getElementById("screen").value;
let icloud=document.getElementById("icloud").value;
let open=document.getElementById("open").value;
let zalo=document.getElementById("zalo").value;

let result=document.getElementById("result");

if(!model||!storage||!battery||!damage||!screen||!icloud||!open){
 result.innerHTML="❌ Nhập đầy đủ thông tin";
 return;
}

if(!/^0[0-9]{9}$/.test(zalo)){
 result.innerHTML="⚠️ Zalo không hợp lệ";
 return;
}

let market=MARKET[model];
let price=market*rate(model);

// storage
if(storage==64) price-=400000;
if(storage==256) price+=500000;
if(storage==512) price+=1200000;
if(storage=="1tb") price+=2500000;

// damage
if(damage=="nhẹ") price-=market*0.03;
if(damage=="viền") price-=market*0.05;
if(damage=="nặng") price-=market*0.1;

// pin
if(battery<90) price-=300000;
if(battery<85) price-=600000;
if(battery<80) price-=1000000;

// screen
if(screen=="oled") price-=market*0.06;
if(screen=="bể") price-=market*0.15;

// bung
if(open=="bung") price-=market*0.07;

// icloud
if(icloud=="lock"){
 price=(market*0.6)*0.75;
}

// ép giá
price-=300000;

if(price<1000000) price=1000000;

price=Math.round(price/100000)*100000;

result.innerHTML=`<div class="result"><div class="price">${price.toLocaleString()} VNĐ</div></div>`;

// SAVE
save({model,storage,battery,damage,screen,icloud,open,zalo,price});

}

// ADMIN
function admin(){
let pass=prompt("Mật khẩu admin");
if(pass!=="123456"){alert("Sai");return;}

let data=JSON.parse(localStorage.getItem("khach")||"[]");

if(!data.length){alert("Chưa có dữ liệu");return;}

let csv="STT,Model,Storage,Pin,Damage,Screen,iCloud,Bung,Zalo,Price,Time\n";

data.forEach((d,i)=>{
 csv+=`${i+1},${d.model},${d.storage},${d.battery},${d.damage},${d.screen},${d.icloud},${d.open},${d.zalo},${d.price},${d.time}\n`;
});

let blob=new Blob([csv]);
let a=document.createElement("a");
a.href=URL.createObjectURL(blob);
a.download="khach.csv";
a.click();

}

// UPLOAD
function upload(){
 alert("🚧 Đang phát triển");
}

</script>

</body>
</html>
