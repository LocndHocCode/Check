<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Thu mua iPhone PRO</title>

<style>
body{font-family:-apple-system;background:#f2f2f7;margin:0;color:#1c1c1e}
header{position:sticky;top:0;background:#fff;padding:14px;text-align:center;font-weight:600}
#summaryBar{position:sticky;top:48px;background:#fff;padding:8px;font-size:13px;border-bottom:1px solid #eee;display:none}
.progress{height:4px;background:#ddd}
.progress-bar{height:100%;width:0;background:#007aff}
.container{padding:15px;max-width:500px;margin:auto}
.card{background:#fff;border-radius:18px;padding:18px}
.step{display:none}.step.active{display:block}
input,select{width:100%;padding:14px;border-radius:14px;border:none;background:#f2f2f7;margin-top:10px}
.btn,.next{padding:14px;border-radius:14px;margin-top:10px;text-align:center;font-weight:600}
.btn{background:#eee}.btn.active{background:#007aff;color:#fff}
.next{background:#007aff;color:#fff}
.result{background:#fff;padding:15px;margin-top:15px;border-radius:18px}
.price{font-size:24px;text-align:center;color:#34c759;font-weight:700}
</style>
</head>

<body>

<header>Thu mua iPhone</header>

<div id="summaryBar">
📱 <span id="sumModel"></span> |
💾 <span id="sumStorage"></span> |
🎨 <span id="sumColor"></span> |
🌍 <span id="sumMarket"></span> |
⭐ <span id="sumScore"></span>
</div>

<div class="progress"><div id="progressBar" class="progress-bar"></div></div>

<div class="container">
<div class="card">

<!-- STEP 1 -->
<div class="step active">
<select id="model"></select>
<div class="next" onclick="next()">Tiếp</div>
</div>

<!-- STEP 2 -->
<div class="step">
<select id="storage"></select>

<select id="color">
<option>Black</option>
<option>White</option>
<option>Blue</option>
<option>Purple</option>
<option>Gold</option>
<option>Pink</option>
</select>

<select id="market">
<option value="VNA">VN/A</option>
<option value="LL">LL/A</option>
<option value="ZP">ZP/A</option>
<option value="CH">CH/A</option>
</select>

<div class="btn" onclick="prev()">← Quay lại</div>
<div class="next" onclick="next()">Tiếp</div>
</div>

<!-- STEP 3 -->
<div class="step">
<input type="range" id="battery" min="70" max="100" value="90">
<div><span id="batteryValue">90</span>%</div>

<div class="btn" onclick="pick(this,'pin','zin')">Pin zin</div>
<div class="btn" onclick="pick(this,'pin','thay')">Pin thay</div>

<div class="btn" onclick="prev()">← Quay lại</div>
<div class="next" onclick="next()">Tiếp</div>
</div>

<!-- STEP 4 -->
<div class="step">
<div class="btn" onclick="pick(this,'body','zin')">Chưa bung</div>
<div class="btn" onclick="pick(this,'body','bung')">Đã bung</div>

<div class="btn" onclick="prev()">← Quay lại</div>
<div class="next" onclick="next()">Tiếp</div>
</div>

<!-- STEP 5 -->
<div class="step">
<input id="expect" placeholder="vd 15">
<div id="expectView"></div>

<input id="name" placeholder="Tên khách">
<input id="phone" placeholder="SĐT">

<div class="btn" onclick="prev()">← Quay lại</div>
<div class="next" onclick="calc()">Xem giá</div>
</div>

</div>

<div id="result"></div>
</div>

<script>

// ===== MODEL =====
const MODELS=[
"iphone x","iphone xr","iphone xs","iphone xs max",
"iphone 11","iphone 11 pro","iphone 11 pro max",
"iphone 12 mini","iphone 12","iphone 12 pro","iphone 12 pro max",
"iphone 13 mini","iphone 13","iphone 13 pro","iphone 13 pro max",
"iphone 14","iphone 14 plus","iphone 14 pro","iphone 14 pro max",
"iphone 15","iphone 15 plus","iphone 15 pro","iphone 15 pro max",
"iphone 16","iphone 16 plus","iphone 16 pro","iphone 16 pro max",
"iphone 17","iphone 17 plus","iphone 17 pro","iphone 17 pro max"
];
MODELS.forEach(x=>model.innerHTML+=`<option>${x}</option>`);

// ===== STORAGE =====
function getStorage(m){
if(m.includes("pro")) return [128,256,512,1024];
if(m.includes("max")) return [256,512,1024];
return [64,128,256];
}
function loadStorage(){
storage.innerHTML="";
getStorage(model.value).forEach(x=>storage.innerHTML+=`<option value="${x}">${x}GB</option>`);
}

// ===== BASE PRICE =====
const basePrice={
"iphone x":3000000,"iphone xr":4000000,"iphone xs":4500000,"iphone xs max":5500000,
"iphone 11":6500000,"iphone 11 pro":8000000,"iphone 11 pro max":9000000,
"iphone 12":9000000,"iphone 12 pro":11000000,"iphone 12 pro max":12000000,
"iphone 13":11000000,"iphone 13 pro":14000000,"iphone 13 pro max":15000000,
"iphone 14":13000000,"iphone 14 pro":17000000,"iphone 14 pro max":18000000,
"iphone 15":15000000,"iphone 15 pro":20000000,"iphone 15 pro max":22000000,
"iphone 16":18000000,"iphone 16 pro":23000000,"iphone 16 pro max":25000000,
"iphone 17":20000000,"iphone 17 pro":26000000,"iphone 17 pro max":28000000
};

// ===== ENGINE =====
function modelFactor(m){
if(m.includes("17")) return 1.05;
if(m.includes("16")) return 1.02;
if(m.includes("15")) return 1;
if(m.includes("14")) return 0.95;
if(m.includes("13")) return 0.9;
return 0.85;
}

function batteryPenalty(m,b){
if(m.includes("15")||m.includes("16")||m.includes("17")){
if(b<90) return -400000;
if(b<85) return -800000;
}else{
if(b<85) return -500000;
if(b<80) return -1000000;
}
return 0;
}

function storageAdj(s){
s=parseInt(s);
if(s==64) return -800000;
if(s==256) return 300000;
if(s==512) return -200000;
if(s==1024) return -800000;
return 0;
}

function colorAdj(c){
c=c.toLowerCase();
if(c.includes("black")) return 200000;
if(c.includes("purple")) return -200000;
return 0;
}

function marketAdj(m){
if(m=="VNA") return 200000;
if(m=="CH") return -400000;
return 0;
}

function conditionAdj(){
let p=0;
if(selected.pin=="thay") p-=600000;
if(selected.body=="bung") p-=1200000;
return p;
}

function calcScore(){
let s=10;
if(battery.value<85) s-=1;
if(selected.pin=="thay") s-=1;
if(selected.body=="bung") s-=2;
return s.toFixed(1);
}

// ===== STEP =====
let step=0,steps=document.querySelectorAll(".step");
function show(){
steps.forEach(s=>s.classList.remove("active"));
steps[step].classList.add("active");
progressBar.style.width=(step/(steps.length-1)*100)+"%";
updateSummary();
saveState();
}
function next(){if(step<steps.length-1){step++;show()}}
function prev(){if(step>0){step--;show()}}

// ===== PICK =====
let selected={};
function pick(el,k,v){
selected[k]=v;
el.parentElement.querySelectorAll(".btn").forEach(b=>b.classList.remove("active"));
el.classList.add("active");
updateSummary();
}

// ===== SUMMARY =====
function updateSummary(){
summaryBar.style.display="block";
sumModel.innerText=model.value;
sumStorage.innerText=storage.value;
sumColor.innerText=color.value;
sumMarket.innerText=market.value;
sumScore.innerText=calcScore()+"/10";
}

// ===== SAVE =====
function saveState(){
localStorage.setItem("f",JSON.stringify({
step,model:model.value,storage:storage.value,battery:battery.value,selected
}));
}

// ===== LOAD =====
function loadState(){
let d=JSON.parse(localStorage.getItem("f")||"null");
if(!d)return;
model.value=d.model||model.value;
loadStorage();
setTimeout(()=>{
storage.value=d.storage||storage.value;
battery.value=d.battery||90;
selected=d.selected||{};
batteryValue.innerText=battery.value;
step=d.step||0;
show();
},100);
}

// ===== EXPECT =====
expect.oninput=()=>{
let raw=expect.value.replace(/\D/g,"");
if(!raw)return expectView.innerText="";
let num=parseInt(raw);
if(num<1000) num*=1000000;
expectView.innerText="👉 "+num.toLocaleString()+"đ";
}

// ===== CALC =====
function calc(){

let base=basePrice[model.value]||10000000;
let price=base*modelFactor(model.value);

price+=batteryPenalty(model.value,battery.value);
price+=storageAdj(storage.value);
price+=colorAdj(color.value);
price+=marketAdj(market.value);
price+=conditionAdj();

if(price<1000000) price=1000000;

let min=Math.round(price*0.92);
let max=Math.round(price*1.05);

result.innerHTML=`
<div class="result">
<div class="price">${min.toLocaleString()} - ${max.toLocaleString()}đ</div>
<div style="text-align:center;color:#666">${calcScore()}/10</div>
</div>
`;
}

// INIT
model.onchange=()=>{loadStorage();updateSummary();saveState();}
battery.oninput=()=>{batteryValue.innerText=battery.value;updateSummary();saveState();}

loadStorage();
loadState();
show();

</script>

</body>
</html>
