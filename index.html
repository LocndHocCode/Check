<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Thu mua iPhone PRO</title>

<style>
body{margin:0;font-family:-apple-system;background:#f2f2f7}

header{
position:sticky;top:0;background:#fff;
padding:14px;text-align:center;font-weight:600
}

.progress{height:4px;background:#ddd}
.progress-bar{
height:100%;width:0;
background:linear-gradient(90deg,#007aff,#34c759);
transition:.3s
}

.summary{
background:#fff;padding:8px;font-size:13px;
border-bottom:1px solid #eee;text-align:center
}

.container{max-width:500px;margin:auto;padding:15px}
.card{
background:#fff;border-radius:20px;padding:18px;
box-shadow:0 10px 25px rgba(0,0,0,.08)
}

.step{display:none}
.step.active{display:block}

input,select{
width:100%;padding:14px;border-radius:14px;
border:none;background:#f2f2f7;margin-top:10px
}

.btn,.next{
padding:14px;border-radius:14px;margin-top:10px;
text-align:center;font-weight:600
}
.btn{background:#eee}
.btn.active{background:#007aff;color:#fff}
.next{background:#007aff;color:#fff}

.price{
font-size:26px;text-align:center;
color:#34c759;font-weight:700;margin-top:15px
}

.loading{
text-align:center;padding:20px;display:none
}

.spinner{
width:30px;height:30px;
border:3px solid #ddd;border-top:3px solid #007aff;
border-radius:50%;
animation:spin 1s linear infinite;
margin:auto
}
@keyframes spin{to{transform:rotate(360deg)}}

/* FB + MAP */
.embed-box{
background:#fff;
border-radius:16px;
padding:10px;
margin-top:15px;
box-shadow:0 5px 15px rgba(0,0,0,.05)
}
</style>
</head>

<body>

<header>📱 Thu mua iPhone</header>

<div class="summary" id="summary">Chưa chọn</div>

<div class="progress">
<div id="progressBar" class="progress-bar"></div>
</div>

<div class="container">
<div class="card">

<!-- STEP 1 -->
<div class="step active">
<select id="model"></select>
<div class="next" onclick="next()">Tiếp</div>
</div>

<!-- STEP 2 -->
<div class="step">
<select id="storage"></select>

<select id="color">
<option>Black</option>
<option>White</option>
<option>Gold</option>
<option>Purple</option>
</select>

<div class="btn" onclick="prev()">← Quay lại</div>
<div class="next" onclick="next()">Tiếp</div>
</div>

<!-- STEP 3 -->
<div class="step">
<input type="range" id="battery" min="70" max="100" value="90">
<div>🔋 <span id="batteryValue">90</span>%</div>

<div class="btn" onclick="pick(this,'pin','zin')">Pin zin</div>
<div class="btn" onclick="pick(this,'pin','thay')">Pin thay</div>

<div class="btn" onclick="prev()">← Quay lại</div>
<div class="next" onclick="next()">Tiếp</div>
</div>

<!-- STEP 4 (MÀN HÌNH) -->
<div class="step">
<div class="btn" onclick="pick(this,'screen','zin')">Màn zin</div>
<div class="btn" onclick="pick(this,'screen','linh')">Màn linh kiện</div>
<div class="btn" onclick="pick(this,'screen','loi')">Màn lỗi</div>

<div class="btn" onclick="prev()">← Quay lại</div>
<div class="next" onclick="next()">Tiếp</div>
</div>

<!-- STEP 5 -->
<div class="step">
<div class="btn" onclick="pick(this,'body','zin')">Chưa bung</div>
<div class="btn" onclick="pick(this,'body','bung')">Đã bung</div>

<div class="btn" onclick="prev()">← Quay lại</div>
<div class="next" onclick="calc()">Xem giá</div>
</div>

</div>

<div id="loading" class="loading">
<div class="spinner"></div>
<div>Đang ép giá...</div>
</div>

<div id="result"></div>

<!-- MAP -->
<div class="embed-box">
<iframe 
src="https://maps.google.com/maps?q=Can%20Giuoc&t=&z=15&output=embed"
width="100%" height="120" style="border:none;border-radius:10px">
</iframe>
</div>

<!-- FACEBOOK -->
<div class="embed-box">
<div class="fb-page"
data-href="https://www.facebook.com/profile.php?id=100015148662826"
data-tabs="timeline"
data-width="500"
data-height="200"
data-small-header="false"
data-adapt-container-width="true"
data-hide-cover="false"
data-show-facepile="true">
</div>
</div>

</div>

<!-- FB SDK -->
<div id="fb-root"></div>
<script async defer crossorigin="anonymous"
src="https://connect.facebook.net/vi_VN/sdk.js#xfbml=1&version=v19.0">
</script>

<script>

// DOM
const model=document.getElementById("model");
const storage=document.getElementById("storage");
const battery=document.getElementById("battery");
const batteryValue=document.getElementById("batteryValue");
const result=document.getElementById("result");
const progressBar=document.getElementById("progressBar");
const summary=document.getElementById("summary");
const loading=document.getElementById("loading");

// DATA GIÁ (ép thấp hơn thị trường ~1tr5)
const MODELS={
"iPhone X":3500000,
"iPhone XR":4000000,
"iPhone XS":4500000,
"iPhone XS Max":5500000,

"iPhone 11":5500000,
"iPhone 11 Pro":6500000,
"iPhone 11 Pro Max":7500000,

"iPhone 12":7000000,
"iPhone 12 Pro":8500000,
"iPhone 12 Pro Max":10000000,

"iPhone 13":9000000,
"iPhone 13 Pro":11000000,
"iPhone 13 Pro Max":13000000,

"iPhone 14":10500000,
"iPhone 14 Pro":13500000,
"iPhone 14 Pro Max":16000000,

"iPhone 15":12500000,
"iPhone 15 Pro":17500000,
"iPhone 15 Pro Max":20500000,

"iPhone 16":15500000,
"iPhone 16 Pro":21500000,
"iPhone 16 Pro Max":24500000,

"iPhone 17":17500000,
"iPhone 17 Pro":23500000,
"iPhone 17 Pro Max":26500000
};

// LOAD MODEL
for(let m in MODELS){
model.innerHTML+=`<option value="${m}">${m}</option>`;
}

// STORAGE
function getStorage(m){
return m.includes("Pro")?[128,256,512,1024]:[64,128,256];
}

function loadStorage(){
storage.innerHTML="";
getStorage(model.value).forEach(x=>{
storage.innerHTML+=`<option>${x}GB</option>`;
});
}

// STEP
let step=0;
const steps=document.querySelectorAll(".step");

function show(){
steps.forEach(s=>s.classList.remove("active"));
steps[step].classList.add("active");
progressBar.style.width=(step/(steps.length-1)*100)+"%";
updateSummary();
}

function next(){if(step<steps.length-1){step++;show();}}
function prev(){if(step>0){step--;show();}}

// PICK
let selected={};
function pick(el,k,v){
selected[k]=v;
el.parentElement.querySelectorAll(".btn").forEach(b=>b.classList.remove("active"));
el.classList.add("active");
}

// PIN
battery.oninput=()=>batteryValue.innerText=battery.value;

// SUMMARY
function updateSummary(){
summary.innerText=`${model.value||""} | ${storage.value||""} | Pin ${battery.value}%`;
}

// FORMAT
function format(n){
return n.toLocaleString("vi-VN")+"đ";
}

// CALC
function calc(){

loading.style.display="block";
result.innerHTML="";

setTimeout(()=>{

let price=MODELS[model.value];

// dung lượng
let gb=parseInt(storage.value);
if(gb>=256) price+=800000;
if(gb>=512) price+=1500000;
if(gb==1024) price+=2500000;

// pin
if(battery.value<85) price-=500000;
if(selected.pin==="thay") price-=700000;

// màn
if(selected.screen==="linh") price-=800000;
if(selected.screen==="loi") price-=1500000;

// body
if(selected.body==="bung") price-=1200000;

// range
let min=Math.round(price*0.9);
let max=Math.round(price*1.05);

loading.style.display="none";

result.innerHTML=`<div class="price">${format(min)} - ${format(max)}</div>`;

},800);
}

// INIT
model.onchange=loadStorage;
loadStorage();
show();

</script>

</body>
</html>
