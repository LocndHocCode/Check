<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Thu mua iPhone PRO</title>

<style>
body{font-family:-apple-system;background:#f2f2f2;margin:0}
header{background:#ffd400;padding:16px;text-align:center;font-weight:700}

.progress{height:6px;background:#ddd}
.progress-bar{
height:100%;
width:0%;
background:linear-gradient(90deg,#ffd400,#ff9f00,#ff3c00);
transition:.4s
}

.container{max-width:520px;margin:auto;padding:15px}
.card{background:#fff;padding:18px;border-radius:14px;box-shadow:0 4px 15px rgba(0,0,0,.06)}

.step{display:none}
.step.active{display:block}

.title{font-weight:700;margin-bottom:10px}

input,select{
width:100%;
padding:14px;
margin-top:10px;
border-radius:10px;
border:1px solid #ddd
}

.grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:10px}

.btn,.next{
padding:14px;
border-radius:12px;
text-align:center;
font-weight:600
}

.btn{border:1px solid #ddd}
.btn.active{border:2px solid #ffd400;background:#fffbe6}

.next{background:#ffd400;border:none}

.result{margin-top:15px;background:#fff;padding:18px;border-radius:14px}
.price{font-size:22px;color:green;text-align:center}

.loading{
position:fixed;inset:0;
background:rgba(0,0,0,.4);
display:none;
justify-content:center;
align-items:center;
}
.spinner{
width:40px;height:40px;
border:4px solid #fff;
border-top:4px solid #ffd400;
border-radius:50%;
animation:spin 1s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>

<body>

<header>📱 THU MUA IPHONE</header>
<div class="progress"><div id="progressBar" class="progress-bar"></div></div>

<div class="container">
<div class="card" id="card">

<!-- STEP 1 -->
<div class="step active">
<div class="title">📱 Chọn máy</div>
<select id="model"></select>
<button class="next" onclick="nextStep()">Tiếp</button>
</div>

<!-- STEP 2 -->
<div class="step">
<div class="title">💾 Dung lượng & 🎨 màu</div>
<select id="storage"></select>
<select id="color"></select>
<button class="next" onclick="nextStep()">Tiếp</button>
</div>

<!-- STEP 3 -->
<div class="step">
<div class="title">🔋 Pin</div>
<input type="range" id="battery" min="70" max="100" value="90">
<div><span id="batteryValue">90</span>%</div>

<div class="grid">
<div class="btn" onclick="pick(this,'pinType','zin')">Pin zin</div>
<div class="btn" onclick="pick(this,'pinType','thay')">Pin thay</div>
</div>

<button class="next" onclick="nextStep()">Tiếp</button>
</div>

<!-- STEP 4 -->
<div class="step">
<div class="title">📦 Xuất xứ</div>
<select id="market">
<option value="VNA">VN/A</option>
<option value="LL">LL/A</option>
<option value="ZP">ZP/A</option>
<option value="CH">CH/A</option>
<option value="EU">EU</option>
</select>

<div class="grid">
<div class="btn" onclick="pick(this,'body','zin')">Chưa bung</div>
<div class="btn" onclick="pick(this,'body','bung')">Đã bung</div>
</div>

<button class="next" onclick="nextStep()">Tiếp</button>
</div>

<!-- STEP 5 -->
<div class="step">
<div class="title">📺 Màn hình</div>
<label><input type="radio" name="screen" value="ok"> OK</label>
<label><input type="radio" name="screen" value="broken"> Bể</label>

<button class="next" onclick="nextStep()">Tiếp</button>
</div>

<!-- STEP 6 -->
<div class="step">
<div class="title">💰 Giá + khách</div>
<input id="expect" placeholder="Giá mong muốn (vd 15)">
<div id="expectView"></div>

<input id="name" placeholder="Tên khách">
<input id="phone" placeholder="SĐT">

<button class="next" onclick="calc()">Xem giá</button>
</div>

</div>

<div id="result"></div>

<!-- CONTACT -->
<div class="result">
<h3>📞 Liên hệ</h3>

<a href="https://zalo.me/0827703579" target="_blank">
<button class="next">💬 Zalo</button>
</a>

<a href="https://facebook.com/yourpage" target="_blank">
<button class="btn">📘 Facebook</button>
</a>
</div>

<div class="result">
<h3>📍 Địa chỉ</h3>
<iframe src="https://www.google.com/maps?q=Can+Giuoc+Long+An&output=embed"
width="100%" height="200" style="border:0;border-radius:10px;"></iframe>
</div>

</div>

<div class="loading" id="loading"><div class="spinner"></div></div>

<script>

// MODEL FULL
const MODELS=[
"iphone x","iphone xr","iphone xs","iphone xs max",
"iphone 11","iphone 11 pro","iphone 11 pro max",
"iphone 12 mini","iphone 12","iphone 12 pro","iphone 12 pro max",
"iphone 13 mini","iphone 13","iphone 13 pro","iphone 13 pro max",
"iphone 14","iphone 14 plus","iphone 14 pro","iphone 14 pro max",
"iphone 15","iphone 15 plus","iphone 15 pro","iphone 15 pro max",
"iphone 16","iphone 16 plus","iphone 16 pro","iphone 16 pro max",
"iphone 17","iphone 17 plus","iphone 17 pro","iphone 17 pro max"
];

MODELS.forEach(x=>model.innerHTML+=`<option>${x}</option>`);

// AUTO DATA
function getStorage(m){
if(m.includes("pro")) return [128,256,512,1024];
if(m.includes("max")) return [256,512,1024];
return [64,128,256];
}
function getColors(m){
if(m.includes("15")||m.includes("16")||m.includes("17")){
return ["titan_black","titan_white","titan_blue","titan_natural"];
}
return ["black","white","blue","purple"];
}

function load(){
storage.innerHTML="";
color.innerHTML="";
getStorage(model.value).forEach(x=>storage.innerHTML+=`<option>${x}GB</option>`);
getColors(model.value).forEach(x=>color.innerHTML+=`<option>${x}</option>`);
}
model.onchange=load;
load();

// STEP
let step=0;
let steps=document.querySelectorAll(".step");

function show(){
steps.forEach(s=>s.classList.remove("active"));
steps[step].classList.add("active");
progressBar.style.width=(step/(steps.length-1)*100)+"%";
}
function nextStep(){if(step<steps.length-1){step++;show()}}
function prevStep(){if(step>0){step--;show()}}

// SWIPE
let startX=0;
card.addEventListener("touchstart",e=>startX=e.touches[0].clientX);
card.addEventListener("touchend",e=>{
let dx=e.changedTouches[0].clientX-startX;
if(dx>50) prevStep();
if(dx<-50) nextStep();
});

// PICK
let selected={};
function pick(el,k,v){
selected[k]=v;
el.parentElement.querySelectorAll(".btn").forEach(b=>b.classList.remove("active"));
el.classList.add("active");
}

// PIN
battery.oninput=()=>batteryValue.innerText=battery.value;

// EXPECT
expect.oninput=()=>{
let raw=expect.value.replace(/\D/g,"");
if(!raw)return expectView.innerText="";
let num=parseInt(raw);
if(num<1000) num*=1000000;
expectView.innerText="👉 "+num.toLocaleString()+"đ";
}

// CRM SAVE
function saveCustomer(data){
let list=JSON.parse(localStorage.getItem("customers")||"[]");
list.unshift(data);
localStorage.setItem("customers",JSON.stringify(list));
}

// CALC
function calc(){
loading.style.display="flex";

setTimeout(()=>{

let price=15000000;
if(battery.value<85) price-=500000;
if(selected.pinType==="thay") price-=600000;
if(selected.body==="bung") price-=1200000;

let min=Math.round(price*0.9);
let max=Math.round(price*1.05);

let customer={
name:name.value||"Khách lẻ",
phone:phone.value||"",
model:model.value,
price:min.toLocaleString()+"đ"
};
saveCustomer(customer);

result.innerHTML=`
<div class="result">
<div class="price">${min.toLocaleString()} - ${max.toLocaleString()}đ</div>
</div>
`;

loading.style.display="none";

},700);
}

show();

</script>

</body>
</html>
